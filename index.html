<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажёр запоминания</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .mono { 
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; 
        }
        .masked {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            word-break: break-all;   /* ← это решает проблему горизонтального скролла */
        }
    </style>
</head>
<body class="bg-zinc-50 min-h-screen py-8">

    <div class="max-w-[960px] mx-auto px-5">

        <!-- ЭКРАН ВВОДА -->
        <div id="edit-screen">
            <div class="text-center mb-10">
                <h1 class="text-4xl font-semibold tracking-tight text-zinc-900">Тренажёр запоминания</h1>
                <p class="text-zinc-600 mt-2">Вставь текст → тренируйся по памяти</p>
            </div>
            <div class="bg-white rounded-3xl shadow border border-zinc-100 p-8">
                <textarea id="inputText" rows="13"
                          class="w-full p-5 text-base mono leading-relaxed border border-zinc-200 rounded-3xl focus:border-violet-500 focus:ring-4 focus:ring-violet-100 outline-none resize-y"
                          placeholder="Вставьте текст сюда...&#10;Каждая новая строка = отдельное задание"></textarea>
                <div class="flex gap-4 mt-6">
                    <button onclick="startTraining()" 
                            class="flex-1 bg-violet-600 hover:bg-violet-700 text-white font-semibold py-5 rounded-3xl text-lg transition-all">Начать тренировку</button>
                    <button onclick="clearEdit()" 
                            class="px-10 bg-zinc-100 hover:bg-zinc-200 text-zinc-700 font-medium rounded-3xl transition-all">Очистить</button>
                </div>
            </div>
        </div>

        <!-- ЭКРАН ТРЕНИРОВКИ -->
        <div id="train-screen" class="hidden">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h2 class="text-3xl font-semibold text-zinc-900">Тренировка по памяти</h2>
                    <p id="progress" class="text-zinc-500">0 из 0 строк завершено</p>
                </div>
                <button onclick="backToEdit()" 
                        class="px-6 py-3 bg-white border border-zinc-200 hover:border-zinc-300 rounded-3xl flex items-center gap-2 transition-all">
                    Новый текст
                </button>
            </div>

            <div id="pairs" class="space-y-5"></div>

            <div id="success-message" class="hidden mt-20 text-center">
                <div class="text-7xl mb-4">🎉</div>
                <h3 class="text-3xl font-semibold text-emerald-700">Ты всё запомнил идеально!</h3>
            </div>
        </div>
    </div>

    <script>
        let originalLines = [];

        function startTraining() {
            const text = document.getElementById('inputText').value.trim();
            if (!text) return alert('Сначала вставь текст!');

            originalLines = text.split('\n').filter(l => l.trim() !== '');

            document.getElementById('edit-screen').classList.add('hidden');
            document.getElementById('train-screen').classList.remove('hidden');

            renderPairs();
        }

        function renderPairs() {
            const container = document.getElementById('pairs');
            container.innerHTML = '';

            originalLines.forEach((line, i) => {
                const pairHTML = `
                    <div class="grid grid-cols-2 gap-6 items-start">
                        <!-- Левая колонка -->
                        <div>
                            <div class="text-xs text-zinc-400 mb-1.5 pl-1">Строка ${i+1}</div>
                            <div id="masked-${i}" 
                                 class="masked mono text-[15px] bg-white border border-zinc-200 rounded-3xl px-4 py-4 text-zinc-900 leading-snug min-h-[54px]">
                                ${'*'.repeat(line.length)}
                            </div>
                        </div>

                        <!-- Правая колонка -->
                        <div>
                            <div class="text-xs text-zinc-400 mb-1.5 pl-1">Твой ввод</div>
                            <input type="text" id="input-${i}"
                                   class="mono text-[15px] w-full border border-zinc-200 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100 rounded-3xl px-4 py-4 outline-none transition-all"
                                   placeholder="Введи строку по памяти...">
                        </div>
                    </div>
                `;
                container.innerHTML += pairHTML;
            });

            // Подключаем обработчики
            originalLines.forEach((line, i) => {
                const input = document.getElementById(`input-${i}`);
                const masked = document.getElementById(`masked-${i}`);

                input.addEventListener('input', () => {
                    const entered = input.value;
                    let revealed = '';

                    for (let j = 0; j < line.length; j++) {
                        if (j < entered.length && entered[j] === line[j]) {
                            revealed += line[j];
                        } else {
                            revealed += '*'.repeat(line.length - j);
                            break;
                        }
                    }

                    masked.textContent = revealed || '*'.repeat(line.length);

                    const complete = entered === line;

                    if (complete) {
                        masked.classList.add('!border-emerald-500', '!bg-emerald-50');
                        input.classList.add('!border-emerald-500', '!bg-emerald-50');
                    } else {
                        masked.classList.remove('!border-emerald-500', '!bg-emerald-50');
                        input.classList.remove('!border-emerald-500', '!bg-emerald-50');
                    }

                    updateProgress();
                    checkAllDone();
                });
            });
        }

        function updateProgress() {
            let done = 0;
            originalLines.forEach((_, i) => {
                const inp = document.getElementById(`input-${i}`);
                if (inp && inp.value === originalLines[i]) done++;
            });
            document.getElementById('progress').textContent = `${done} из ${originalLines.length} строк завершено`;
        }

        function checkAllDone() {
            const allDone = originalLines.every((_, i) => {
                const inp = document.getElementById(`input-${i}`);
                return inp && inp.value === originalLines[i];
            });
            if (allDone && originalLines.length > 0) {
                document.getElementById('success-message').classList.remove('hidden');
            }
        }

        function backToEdit() {
            document.getElementById('train-screen').classList.add('hidden');
            document.getElementById('edit-screen').classList.remove('hidden');
            document.getElementById('success-message').classList.add('hidden');
            document.getElementById('inputText').value = '';
            originalLines = [];
        }

        function clearEdit() {
            document.getElementById('inputText').value = '';
        }
    </script>
</body>
</html>
